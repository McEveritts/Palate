<style>
  :root {
    --color-slate-950: #020617;
  }
  
  .logo-presentation {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 3rem;
    background: var(--color-slate-950);
    border-radius: 2rem;
    border: 1px solid rgba(255,255,255,0.1);
    margin-top: 2rem;
  }
  
  .logo-container {
    width: 300px;
    height: 300px;
  }
</style>

<h2>Umami Logo: Food x Technology</h2>
<p class="subtitle">A digital neon bowl with circuit traces and steam represented as digital nodes.</p>

<div class="logo-presentation">
  <div class="logo-container">
    <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="100%" height="100%">
      <defs>
        <linearGradient id="neon" x1="0%" y1="0%" x2="100%" y2="100%">
          <stop offset="0%" stop-color="#818cf8" />
          <stop offset="100%" stop-color="#6366f1" />
        </linearGradient>
        <linearGradient id="neonDark" x1="0%" y1="0%" x2="100%" y2="100%">
          <stop offset="0%" stop-color="#4f46e5" />
          <stop offset="100%" stop-color="#312e81" />
        </linearGradient>
        <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
          <feGaussianBlur stdDeviation="8" result="blur" />
          <feComposite in="SourceGraphic" in2="blur" operator="over" />
        </filter>
      </defs>
      
      <!-- Background -->
      <rect width="512" height="512" rx="120" fill="#020617" />
      <rect width="512" height="512" rx="120" fill="url(#neonDark)" opacity="0.1" />
      
      <!-- Tech Traces -->
      <path d="M120,380 L180,380 L220,320 M392,380 L332,380 L292,320 M256,430 L256,360" stroke="#312e81" stroke-width="12" stroke-linecap="round" stroke-linejoin="round" fill="none" />
      <circle cx="120" cy="380" r="16" fill="#4f46e5" />
      <circle cx="392" cy="380" r="16" fill="#4f46e5" />
      <circle cx="256" cy="430" r="16" fill="#4f46e5" />

      <!-- The Digital Bowl (Food) -->
      <path d="M120,250 C120,350 180,380 256,380 C332,380 392,350 392,250 Z" fill="none" stroke="url(#neon)" stroke-width="24" stroke-linecap="round" stroke-linejoin="round" filter="url(#glow)" />
      <path d="M100,250 L412,250" stroke="url(#neon)" stroke-width="24" stroke-linecap="round" filter="url(#glow)" />
      
      <!-- Steam represented as digital nodes connecting to the bowl -->
      <circle cx="200" cy="140" r="14" fill="#e2e8f0" filter="url(#glow)" />
      <circle cx="256" cy="100" r="18" fill="#ffffff" filter="url(#glow)" />
      <circle cx="312" cy="150" r="14" fill="#cbd5e1" filter="url(#glow)" />
      
      <path d="M200,154 L200,226 M256,118 L256,226 M312,164 L312,226" stroke="#475569" stroke-width="8" stroke-linecap="round" stroke-dasharray="10 10" fill="none" />
      
      <!-- Chopsticks / Circuit connection -->
      <path d="M180,250 L300,100 M332,250 L212,100" stroke="#818cf8" stroke-width="12" stroke-linecap="round" fill="none" opacity="0.4" />
    </svg>
  </div>
</div>

<div class="options" style="margin-top: 2rem;">
  <div class="option" data-choice="approved" onclick="toggleSelect(this)">
    <div class="letter">✓</div>
    <div class="content">
      <h3>Looks great</h3>
      <p>This captures the clash perfectly.</p>
    </div>
  </div>
  <div class="option" data-choice="needs-tweaks" onclick="toggleSelect(this)">
    <div class="letter">✎</div>
    <div class="content">
      <h3>Needs tweaks</h3>
      <p>I want a different style or elements.</p>
    </div>
  </div>
</div>
